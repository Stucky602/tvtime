# Architecture ref: ARCHITECTURE_v1.0.md §10
#
# Two jobs in one, both existing to prevent a SILENT failure weeks or
# months from now:
#
# 1. Ping Supabase so the free-tier project never goes a full week
#    without activity, which is when it auto-pauses.
# 2. Push a heartbeat commit, because GitHub disables scheduled
#    workflows in any repo with no commit activity for 60 days. A quiet
#    couple of months would otherwise kill THIS cron, which kills the
#    Supabase ping, which pauses the database -- and nobody would know
#    until the app failed to load. The commit resets that 60-day clock
#    every time this runs.
#
# Cron note: GitHub Actions cron has no native "every N days" -- it's
# calendar-based, not interval-based. `*/4` in the day-of-month field
# fires on days 1, 5, 9, 13, 17, 21, 25, 29 of every month. The gap
# between the last hit in a month and day 1 of the next is never more
# than 4 days (shorter in 30/31-day months, exactly 4 after a 28-day
# February) -- comfortably inside the 7-day pause window with margin to
# spare, which is all this needs to be.

name: Keep database warm

on:
  schedule:
    - cron: '0 12 */4 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-warm:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # `genres` (component 4) is small, static, and always has rows
          # -- a reliable thing to touch regardless of what else has
          # changed in the schema. `-f` makes curl exit non-zero on a
          # non-2xx response, so a paused project or a rotated key fails
          # this step loudly instead of the ping silently doing nothing.
          curl -sf \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/genres?select=id&limit=1" \
            -o /dev/null
          echo "Supabase responded -- project is awake."

      - name: Update heartbeat and push
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/heartbeat.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat.txt

          # The timestamp changes every run, so there is always
          # something to commit -- but guard anyway rather than assume,
          # in case this step is ever re-run within the same second.
          if git diff --cached --quiet; then
            echo "Nothing to commit (unexpected -- timestamp should always differ)."
          else
            git commit -m "chore: heartbeat ($(cat .github/heartbeat.txt))"
            git push
          fi
