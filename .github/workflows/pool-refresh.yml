# Architecture ref: ARCHITECTURE_v1.0.md §5.1, §10
#
# Runs scripts/refresh-pool.mjs on a schedule, plus a manual "Run
# workflow" button in the Actions tab for on-demand refreshes (this IS
# the manual trigger from §5.1 -- there's no in-app button because
# there's no server for an in-app button to call).
#
# No `npm ci` step: the script has zero npm dependencies by design (see
# the script's own header), so there's nothing to install.

name: Refresh title pool

on:
  schedule:
    # 02:00 UTC nightly. TMDB and Supabase both see very little traffic
    # at this hour from a US-audience app, and it lands well before
    # anyone in the US is likely to open the app the next evening.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # A manual run and the nightly cron overlapping would double-throttle
  # against TMDB's rate limit for no benefit -- let the newer one win.
  group: pool-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run pool refresh
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-pool.mjs
