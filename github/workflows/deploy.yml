# Architecture ref: ARCHITECTURE_v1.0.md §10
#
# Builds the PWA and publishes it to GitHub Pages on every push to main.
#
# One-time setup after this file lands in the repo:
#   1. Settings -> Pages -> Build and deployment -> Source ->
#      "GitHub Actions"
#   2. Settings -> Secrets and variables -> Actions -> New repository
#      secret. Add VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY (from
#      Supabase dashboard -> Project Settings -> API). Both are safe as
#      plain repo secrets even though they're not confidential -- RLS is
#      the real gate (see the RLS section above) -- there's just no
#      simpler place to keep them than alongside the rest.
#
# This comment used to say "no secrets needed for this workflow." That
# was true back when this file was written (component 1, before
# Supabase was wired in at all) and has been wrong since component 9
# started reading import.meta.env.VITE_SUPABASE_* at build time -- Vite
# bakes those values in during `npm run build`, so without them here the
# deployed app builds successfully but shows "Not configured" forever.
# Caught by checking this file against what the code actually needs
# rather than trusting the original comment.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you trigger a redeploy by hand from the Actions tab without
  # needing a new commit -- useful right after changing Pages settings.
  workflow_dispatch:

# Least-privilege: this workflow only ever needs to read the repo and
# write to the Pages deployment, never full repo write access.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment should ever be in flight. If two pushes land close
# together, let the newer one win rather than queuing -- there's no
# reason to publish a stale build after a newer one already started.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
